
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV Supermart</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <img src="logo.png" alt="AV Supermart Logo">
        <h1>AV Supermart</h1>
    </div>

    <div class="search-box">
        <input type="text" id="searchBox" placeholder="Search Products...">
    </div>

    <div class="cart">
        🛒 Cart <span id="cart-count">0</span>
    </div>
</header>

<nav class="categories" id="categories">
</nav>

<main>
    <section class="hero">

    <div class="hero-text">
        <h2>Welcome to AV Supermart</h2>
        <p>Best Quality Products at Lowest Prices</p>
        <a href="#products" class="btn">Shop Now</a>
    </div>
</section>

<section class="categories">
    <button>Dal</button>
    <button>Rice</button>
    <button>Atta</button>
    <button>Oil</button>
    <button>Spices</button>
    <button>Dry Fruits</button>
</section>

<h2 id="products">Our Products</h2>

    <div class="products"></div>
</main>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
