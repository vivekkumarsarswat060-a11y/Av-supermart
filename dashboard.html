<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Supermart Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#2d2d2d;
    color:white;
}

header{
    background:#444;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#3b3b3b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#666;
    color:white;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#555;
}
</style>

</head>

<body>

<header>
AV Supermart Admin Dashboard
</header>

<div class="container">

<div class="card">
<h2>Welcome Admin 👋</h2>
<p>You have successfully logged in.</p>
</div>

<div class="card">
<button>Add Product</button>
<button>Edit Product</button>
<button>Delete Product</button>
<button>View Products</button>
</div>

</div>

</body>
</html>
